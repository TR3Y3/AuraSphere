# AuraSphere — Render Blueprint (freight TMS + brokerage CRM).
# Adapted from CALCOR's Render config and updated for this app.
# Create via Render → New → Blueprint, pointed at this repo.
#
# After the first deploy you must set two values (marked `sync: false`):
#   - backend  FRONTEND_ORIGIN = https://<frontend-url>
#   - frontend VITE_API_URL    = https://<backend-url>
# Then seed the first org/admin from the backend Shell:
#   SEED_ADMIN_EMAIL=you@example.com SEED_ADMIN_PASSWORD=... python -m app.seed all

databases:
  - name: aurasphere-db
    plan: free

services:
  # ── Backend: FastAPI JSON API ───────────────────────────────────────
  - type: web
    name: aurasphere-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase:
          name: aurasphere-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: COOKIE_SECURE
        value: "true"
      # SPA and API are on different *.onrender.com sites → cross-site cookie.
      - key: COOKIE_SAMESITE
        value: "none"
      # Set to the deployed frontend URL after the first deploy.
      - key: FRONTEND_ORIGIN
        sync: false
      # Email: real verification emails in production. Default "console" just
      # logs; set EMAIL_DELIVERY=resend + RESEND_API_KEY to actually send
      # (Render blocks SMTP ports, so the Resend HTTP API is the way).
      - key: EMAIL_DELIVERY
        value: "console"
      - key: EMAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      # Billing: default "stub" (upgrades are simulated). Set BILLING_MODE=stripe
      # + the Stripe keys to take real payments, and point a Stripe webhook at
      # https://<backend-url>/api/billing/webhook.
      - key: BILLING_MODE
        value: "stub"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # Carrier vetting: default "stub" (deterministic from the carrier's data).
      # Set VETTING_MODE=highway + HIGHWAY_API_KEY for the real provider.
      - key: VETTING_MODE
        value: "stub"
      - key: HIGHWAY_API_KEY
        sync: false

  # ── Frontend: React SPA (static) ────────────────────────────────────
  - type: web
    name: aurasphere-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      # Set to the deployed backend URL after the first deploy.
      - key: VITE_API_URL
        sync: false
    routes:
      # SPA fallback so client routes (/loads, /carriers, …) resolve.
      - type: rewrite
        source: /*
        destination: /index.html
